<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PushMail — SGI Nexus</title>
    <link rel="stylesheet" href="../../src/css/theme.css">
    <style>
        .form-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-top: 4px solid #00aeef;
            border-radius: 4px;
            padding: 40px 48px;
            max-width: 600px;
        }

        .form-card h2 {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #111111;
            margin-bottom: 28px;
        }

        .form-row {
            display: flex;
            gap: 32px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555555;
        }

        .form-group label .required {
            color: #00aeef;
            margin-right: 2px;
        }

        .form-group input {
            border: 2px solid #111111;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #111111;
            background: #ffffff;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00aeef;
        }

        .form-actions {
            margin-top: 32px;
        }

        .btn-primary {
            background: #00aeef;
            color: #ffffff;
            border: none;
            padding: 11px 36px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #0099d4;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <header>
        <img class="logo" src="../../src/images/sgi_logo.svg" alt="SGI — Intelligent Fulfillment" />
        <div class="header-right">
            <a class="back-link" href="../../index.html">← Back to Portal</a>
            <span class="tagline">PushMail</span>
        </div>
    </header>

    <div class="hero">
        <h1><span>Push</span>Mail</h1>
        <div class="accent-bar"></div>
        <p>Enter a job number to look up and dispatch outbound mail communications.</p>
    </div>

    <main>
        <div class="section-label">Job Entry</div>
        <div class="section-title">JOB NUMBER <strong>LOOKUP</strong></div>
        <div class="divider">
            <div class="divider-square"></div>
            <div class="divider-line"></div>
        </div>

        <div class="form-card">
            <h2>Job Number Entry</h2>
            <form method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label><span class="required">*</span>Job Number</label>
                        <input type="number" name="jobNumber" value="0" min="0" />
                    </div>
                    <div class="form-group">
                        <label><span class="required">*</span>Sub Job Number</label>
                        <input type="number" name="subJobNumber" value="0" min="0" />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2026 <span>SGI</span> — Intelligent Fulfillment &nbsp;|&nbsp; internal.mysgi.com
    </footer>

    <script src="../../src/js/main.js"></script>
</body>
</html>
