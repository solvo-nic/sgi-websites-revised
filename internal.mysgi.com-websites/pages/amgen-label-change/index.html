<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amgen Label Change — SGI Nexus</title>
    <link rel="stylesheet" href="../../src/css/theme.css">
    <style>
        .form-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-top: 4px solid #00aeef;
            border-radius: 4px;
            padding: 40px 48px;
            max-width: 560px;
        }

        .form-card h2 {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #111111;
            margin-bottom: 28px;
        }

        .util-link {
            display: inline-block;
            font-size: 0.78rem;
            color: #00aeef;
            text-decoration: none;
            letter-spacing: 0.06em;
            margin-bottom: 28px;
            transition: opacity 0.2s;
        }
        .util-link:hover { opacity: 0.7; }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .item-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .item-row input {
            flex: 1;
            border: 2px solid #111111;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 0.92rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #111111;
            background: #ffffff;
            transition: border-color 0.2s;
            outline: none;
        }

        .item-row input:focus { border-color: #00aeef; }
        .item-row input::placeholder { color: #aaaaaa; }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555555;
            display: block;
            margin-bottom: 8px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #00aeef;
            color: #ffffff;
            border: none;
            padding: 11px 32px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: #0099d4;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: #111111;
            border: 2px solid #111111;
            padding: 9px 24px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: border-color 0.2s, color 0.2s, transform 0.15s;
        }

        .btn-secondary:hover {
            border-color: #00aeef;
            color: #00aeef;
            transform: translateY(-1px);
        }

        .form-divider {
            height: 1px;
            background: #e0e0e0;
            margin: 24px 0;
        }
    </style>
</head>
<body>

    <header>
        <img class="logo" src="../../src/images/sgi_logo.svg" alt="SGI — Intelligent Fulfillment" />
        <div class="header-right">
            <a class="back-link" href="../../index.html">← Back to Portal</a>
            <span class="tagline">Amgen Label Change</span>
        </div>
    </header>

    <div class="hero">
        <h1>Amgen <span>Label Change</span></h1>
        <div class="accent-bar"></div>
        <p>Track and report Amgen label change requests by item number.</p>
    </div>

    <main>
        <div class="section-label">Report</div>
        <div class="section-title">AMGEN <strong>LABEL CHANGE REPORT</strong></div>
        <div class="divider">
            <div class="divider-square"></div>
            <div class="divider-line"></div>
        </div>

        <a class="util-link" href="#">[ start over ]</a>

        <div class="form-card">
            <h2>Items</h2>
            <form method="post">
                <div class="form-group">
                    <label>Item Numbers</label>
                    <div class="items-list" id="itemsList">
                        <div class="item-row">
                            <input type="text" name="items[]" placeholder="Item number..." />
                        </div>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="button" class="btn-secondary" onclick="addItem()">+ Add Item</button>
                </div>

                <div class="form-divider"></div>

                <div class="btn-row">
                    <button type="submit" class="btn-primary">Continue</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2026 <span>SGI</span> — Intelligent Fulfillment &nbsp;|&nbsp; internal.mysgi.com
    </footer>

    <script src="../../src/js/main.js"></script>
    <script>
        function addItem() {
            const list = document.getElementById('itemsList');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = '<input type="text" name="items[]" placeholder="Item number..." />';
            list.appendChild(row);
            row.querySelector('input').focus();
        }
    </script>
</body>
</html>
